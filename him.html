<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: #333;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      padding: 40px 20px;
      animation: fadeIn 1.5s ease;
    }

    h1 { font-size: 3rem; margin-bottom: 10px; }

    .typing { font-size: 1.5rem; margin-bottom: 30px; height: 30px; }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff6b81;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      margin: 5px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    footer { margin-top: 40px; font-size: 0.9rem; opacity: 0.7; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    /* popup */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Ajeeeeeeeeee ❤️</h1>
  <div class="typing" id="typing"></div>

  <div class="card">
    <h2>⏳ How long we've been together</h2>
    <p id="counter"></p>
  </div>

  <div class="card">
    <h2>Why I Love You</h2>
    <p>therla broo, maybe coz I fit just right in to your arms & no one else's? ✨</p>
  </div>

  <div class="card">
    <h2>My Favorite Thing</h2>
    <p>Talking to you even when we have nothing to say 💬</p>
  </div>

  <div class="card">
    <h2>Unlock Message 🔐</h2>
    <input type="password" id="password" placeholder="Enter password" />
    <br>
    <button onclick="checkPassword()">Unlock</button>
  </div>

  <footer>unakaaga thaan ❤️</footer>
</div>

<!-- popup -->
<div id="popup" class="modal">
  <div class="modal-content">
    <p>enkoodave iruppiya? ❤️</p>
    <button onclick="choose('A')">A. ofcourse</button>
    <button onclick="choose('B')">B. eppovum</button>
    <p id="result"></p>
  </div>
</div>

<script>
  // typing text FIX
  const text = "ahemm, lite ah enakey cringe ah thaan irukku 💌";
  let i = 0;

  function typeEffect() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeEffect, 50);
    }
  }

  // TIMER FIX
  const startDate = new Date(2025, 7, 19); // Aug = 7 (0-based)

  function updateCounter() {
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const mins = Math.floor((diff/(1000*60))%60);
    const secs = Math.floor((diff/1000)%60);

    document.getElementById("counter").innerText =
      `${days} days ${hours} hrs ${mins} mins ${secs} secs ❤️`;
  }

  setInterval(updateCounter,1000);

  // HEARTS FIX
  function createHeart(){
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }
  setInterval(createHeart,400);

  // PASSWORD → POPUP FIX
  function checkPassword(){
    const val = document.getElementById("password").value;
    if(val === "1901"){
      document.getElementById("popup").style.display = "flex";
    } else {
      alert("Wrong password 😝");
    }
  }

  function choose(opt){
    const r = document.getElementById("result");
    if(opt==='A') r.innerText = "I knew it 😌❤️";
    else r.innerText = "appo deal fixed 🤍";
  }

  // INIT
  typeEffect();
  updateCounter();
</script>

</body>
</html>
